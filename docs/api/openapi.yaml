openapi: 3.0.3
info:
  title: ArgoForge E-Commerce & B2B Admin API
  version: 1.1.0
  description: |
    Official API surface for the ArgoForge storefront, admin dashboard, B2B
    portal and supporting edge functions (Razorpay payments, AI negotiation
    chat). All persistent endpoints are backed by Supabase PostgREST with
    Row-Level Security; edge functions are Deno runtimes hosted on Supabase.

    ## Authentication
    - Public reads use the Supabase anon key.
    - Authenticated requests pass a Supabase JWT via `Authorization: Bearer <token>`.
    - Admin endpoints require the caller to hold the `admin` role in `user_roles`.
  contact:
    name: ArgoForge Engineering
    email: api-support@argoforge.example

servers:
  - url: https://brdtmlcwzrmoczemalbd.supabase.co/rest/v1
    description: Supabase PostgREST (production)
  - url: https://brdtmlcwzrmoczemalbd.supabase.co/functions/v1
    description: Supabase Edge Functions (production)

tags:
  - name: Catalog
    description: Public product catalog and discovery.
  - name: Reviews
    description: Public product reviews.
  - name: Promotions
    description: Active promo codes available to shoppers.
  - name: Cart & Wishlist
    description: Authenticated shopper cart and wishlist.
  - name: Orders
    description: Customer order history and creation.
  - name: Account
    description: Profiles, addresses and roles.
  - name: Support
    description: Public contact and B2B inquiry intake.
  - name: Admin
    description: Admin-only management endpoints.
  - name: Payments
    description: Razorpay payment edge functions.
  - name: AI
    description: AI-powered negotiation chat edge function.

paths:
  /products:
    get:
      tags: [Catalog]
      summary: List products
      description: Public read of the product catalog. Supports PostgREST filters such as `category=eq.Furniture`, `price=lte.500`, `order=price.asc`, `limit=20`.
      parameters:
        - { name: select, in: query, schema: { type: string } }
        - { name: category, in: query, schema: { type: string } }
        - { name: room, in: query, schema: { type: string } }
        - { name: order, in: query, schema: { type: string } }
        - { name: limit, in: query, schema: { type: integer } }
      responses:
        '200':
          description: Array of products.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductList' }

  /products?slug=eq.{slug}:
    get:
      tags: [Catalog]
      summary: Get product by slug
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Single product (array of length 1).

  /complementary_products:
    get:
      tags: [Catalog]
      summary: List complementary product mappings
      responses:
        '200': { description: Mappings between products and their complements. }

  /reviews:
    get:
      tags: [Reviews]
      summary: List reviews
      parameters:
        - { name: product_id, in: query, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Reviews list. }
    post:
      tags: [Reviews]
      summary: Create a review (authenticated)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReviewInput' }
      responses:
        '201': { description: Review created. }

  /promo_codes:
    get:
      tags: [Promotions]
      summary: List active promo codes
      description: RLS restricts public reads to rows where `active = true`.
      responses:
        '200': { description: Active promo codes. }

  /cart_items:
    get:
      tags: [Cart & Wishlist]
      summary: Read own cart
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Authenticated user's cart rows. }
    post:
      tags: [Cart & Wishlist]
      summary: Add item to cart
      security: [{ bearerAuth: [] }]
      responses:
        '201': { description: Cart item created. }

  /wishlist_items:
    get:
      tags: [Cart & Wishlist]
      summary: Read own wishlist
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Wishlist rows. }

  /orders:
    get:
      tags: [Orders]
      summary: List own orders
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Orders for the authenticated user. }
    post:
      tags: [Orders]
      summary: Create an order
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderInput' }
      responses:
        '201': { description: Order created. }

  /order_items:
    get:
      tags: [Orders]
      summary: List items for own orders
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Order items the user has access to. }

  /addresses:
    get:
      tags: [Account]
      summary: List own addresses
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Addresses. }

  /profiles:
    get:
      tags: [Account]
      summary: Read profile
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Profile row for the caller. }

  /user_roles:
    get:
      tags: [Account]
      summary: Read own role
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Role rows visible to the caller. }

  /contact_messages:
    post:
      tags: [Support]
      summary: Submit a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactMessage' }
      responses:
        '201': { description: Message stored. }

  /b2b_inquiries:
    post:
      tags: [Support]
      summary: Submit a B2B inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/B2BInquiry' }
      responses:
        '201': { description: Inquiry stored with status `new`. }

  /admin_emails:
    get:
      tags: [Admin]
      summary: List admin emails (admin only)
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Admin email allowlist. }

  /razorpay-create-order:
    post:
      tags: [Payments]
      summary: Create Razorpay order
      security: [{ bearerAuth: [] }]
      description: Server-side creation of a Razorpay order using the project's secret key. Returns the order id required by the client SDK.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:   { type: number, description: Amount in major units (e.g. INR rupees). }
                currency: { type: string, default: INR }
      responses:
        '200':
          description: Order created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  orderId:  { type: string }
                  amount:   { type: integer, description: Amount in paise. }
                  currency: { type: string }
                  keyId:    { type: string }
        '401': { description: Unauthorized. }
        '502': { description: Razorpay upstream error. }

  /razorpay-verify-payment:
    post:
      tags: [Payments]
      summary: Verify Razorpay payment signature
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [razorpay_order_id, razorpay_payment_id, razorpay_signature]
              properties:
                razorpay_order_id:   { type: string }
                razorpay_payment_id: { type: string }
                razorpay_signature:  { type: string }
      responses:
        '200':
          description: Signature valid.
          content:
            application/json:
              schema: { type: object, properties: { valid: { type: boolean } } }
        '400': { description: Missing fields or invalid signature. }
        '401': { description: Unauthorized. }

  /negotiation-chat:
    post:
      tags: [AI]
      summary: AI sales negotiation chat (streaming)
      security: [{ bearerAuth: [] }]
      description: Server-sent stream of AI tokens used by the storefront chat widget.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                messages:
                  type: array
                  items:
                    type: object
                    properties:
                      role:    { type: string, enum: [user, assistant, system] }
                      content: { type: string }
      responses:
        '200': { description: text/event-stream of AI tokens. }
        '402': { description: Payment required (AI gateway credits exhausted). }
        '429': { description: Rate limited. }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Product:
      type: object
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string }
        slug:        { type: string }
        price:       { type: number }
        category:    { type: string }
        image_url:   { type: string }
        stock:       { type: integer }
    ProductList:
      type: array
      items: { $ref: '#/components/schemas/Product' }
    ReviewInput:
      type: object
      required: [product_id, rating]
      properties:
        product_id: { type: string, format: uuid }
        rating:     { type: integer, minimum: 1, maximum: 5 }
        text:       { type: string }
    OrderInput:
      type: object
      properties:
        subtotal: { type: number }
        tax:      { type: number }
        discount: { type: number }
        total:    { type: number }
        shipping_address: { type: object }
    ContactMessage:
      type: object
      required: [name, email]
      properties:
        name:    { type: string }
        email:   { type: string, format: email }
        subject: { type: string }
        message: { type: string }
    B2BInquiry:
      type: object
      required: [company_name, email]
      properties:
        company_name: { type: string }
        contact_name: { type: string }
        email:        { type: string, format: email }
        phone:        { type: string }
        message:      { type: string }
