openapi: 3.0.3
info:
  title: E-Commerce Storefront & B2B Admin API
  version: 1.0.0
  description: |
    # API Documentation Overview
    Welcome to the official developer documentation for the E-Commerce Storefront and B2B Admin Platform.

    ---
    
    ## User Story to API Mappings
    This architecture directly fulfills the project's core business requirements.

    ### Business Owner & Manager (Admin & B2B)
    | Requirement | Relevant Endpoint | User Story Status |
    |---|---|---|
    | **Analytics Dashboard** | `GET /admin/analytics` | Track business growth, seasonal trends, and top SKUs. |
    | **Product CMS** | `POST /admin/products`, `PUT /admin/products/{id}` | Easily add, edit, or remove inventory. |
    | **B2B PDF Catalog** | `GET /b2b/catalog/pdf` | Resellers download wholesale pricing tiers instantly. |
    | **Automated Invoices** | `GET /orders/{id}/invoice` | Tax-compliant invoice generation upon confirmation. |
    | **Fulfillment & Tracking** | `PATCH /admin/orders/{id}/status` | Attach courier links; automate customer updates. |

    ### Customer / Shopper (Storefront)
    | Requirement | Relevant Endpoint | User Story Status |
    |---|---|---|
    | **Storefront Browsing** | `GET /products` (with filters) | Filter by room, material, price, and view 24/7. |
    | **Rich Product Details** | `GET /products/{id}` | View videos, close-ups, and exact scale/color. |
    | **Similar Items Engine** | `GET /products/{id}/recommendations` | Cross-sell and up-sell via complementary products. |
    | **Bulk Order Chat** | `POST /support/inquiries` | Negotiate large/B2B purchases directly with sales. |

  contact:
    name: Engineering Team
    email: api-support@yourcompany.com

servers:
  - url: https://api.yourcompany.com/v1
    description: Production Environment
  - url: http://localhost:8000/api
    description: Local Development Environment

tags:
  - name: Storefront Catalog
    description: Customer-facing product discovery and filtering.
  - name: Orders & Cart
    description: Cart management and checkout flow.
  - name: Admin CMS
    description: Back-office product and inventory management.
  - name: Admin Operations
    description: Order fulfillment, analytics, and financials.
  - name: B2B & Support
    description: Wholesale catalogs and customer inquiries.

paths:
  /products:
    get:
      tags: [Storefront Catalog]
      summary: List and filter products
      description: |
        Retrieves the product catalog. 
        **User Story Fulfillment:** "I want to filter the catalog by categories like room type, material, color, and price range."
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: maxPrice
          in: query
          schema: { type: number }
      responses:
        '200':
          description: A list of products.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductList'

  /products/{id}:
    get:
      tags: [Storefront Catalog]
      summary: Get product details
      description: |
        Retrieves rich product data, including high-quality video links and image close-ups.
        **User Story Fulfillment:** "I want to view high-quality product videos, and detailed close-ups."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Detailed product data.

  /products/{id}/recommendations:
    get:
      tags: [Storefront Catalog]
      summary: Get complementary items
      description: |
        **User Story Fulfillment:** "I want an automated product recommendation engine that displays 'Similar Items' and 'Complementary Products'."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of recommended products.

  /orders:
    post:
      tags: [Orders & Cart]
      summary: Place an order
      description: |
        Converts a cart session into a confirmed order.
        **User Story Fulfillment:** "I want a fully functional storefront so customers can place orders 24/7."
      responses:
        '201':
          description: Order placed successfully.

  /orders/{id}/invoice:
    get:
      tags: [Orders & Cart]
      summary: Download Tax Invoice
      description: |
        **User Story Fulfillment:** "I want automated, tax-compliant invoice generation and email dispatch."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: PDF Invoice binary stream.
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /support/inquiries:
    post:
      tags: [B2B & Support]
      summary: Submit bulk/high-value inquiry
      description: |
        **User Story Fulfillment:** "I want an integrated chat feature for bulk or high-value orders to negotiate pricing."
      responses:
        '201':
          description: Inquiry sent to sales team.

  /b2b/catalog/pdf:
    get:
      tags: [B2B & Support]
      summary: Download Wholesale Catalog
      description: |
        **User Story Fulfillment:** "I want a feature for B2B clients and bulk buyers to download a comprehensive, dynamically updated PDF catalog."
      responses:
        '200':
          description: PDF Catalog binary stream.
          content:
            application/pdf:
              schema: { type: string, format: binary }

  /admin/analytics:
    get:
      tags: [Admin Operations]
      summary: Get business metrics
      security: [{ bearerAuth: [] }]
      description: |
        **User Story Fulfillment:** "I want a centralized analytics dashboard displaying metrics like sales, revenue, and top-selling SKUs."
      responses:
        '200':
          description: Aggregated analytics data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsDashboard'

  /admin/products:
    post:
      tags: [Admin CMS]
      summary: Add new product
      security: [{ bearerAuth: [] }]
      description: |
        **User Story Fulfillment:** "I want an intuitive CMS to easily add, edit, or remove products."
      responses:
        '201':
          description: Product created.

  /admin/orders/{id}/status:
    patch:
      tags: [Admin Operations]
      summary: Update fulfillment and tracking
      security: [{ bearerAuth: [] }]
      description: |
        **User Story Fulfillment:** "I want the ability to update order fulfillment statuses and attach courier tracking links."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string, enum: [Pending, Shipped, Delivered] }
                trackingUrl: { type: string }
      responses:
        '200':
          description: Order status updated.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProductList:
      type: array
      items:
        type: object
        properties:
          id: { type: string }
          name: { type: string }
          price: { type: number }
          media: 
            type: array
            items: { type: string }
    AnalyticsDashboard:
      type: object
      properties:
        totalRevenue: { type: number }
        activeOrders: { type: integer }
        topSkus:
          type: array
          items: { type: string }
